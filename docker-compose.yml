version: '3.8'

services:
  # ==========================================
  # 1. THE DATABASE
  # ==========================================
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: supersecretroot
      MYSQL_DATABASE: employee_db
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpassword
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - employee-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. THE "BLUE" ENVIRONMENT (Port 8081)
  # ==========================================
  employee-app-blue:
    image: employee-app:latest
    container_name: employee-app-blue
    ports:
      - "8081:8080"
    environment:
      # Spring Boot uses these variables to connect to the database
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/employee_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=dbuser
      - SPRING_DATASOURCE_PASSWORD=dbpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - employee-network

  # ==========================================
  # 3. THE "GREEN" ENVIRONMENT (Port 8082)
  # ==========================================
  employee-app-green:
    image: employee-app:latest
    container_name: employee-app-green
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/employee_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=dbuser
      - SPRING_DATASOURCE_PASSWORD=dbpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - employee-network

# ==========================================
# INFRASTRUCTURE SETUP
# ==========================================
networks:
  employee-network:
    driver: bridge

volumes:
  mysql_data:
