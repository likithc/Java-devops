version: '3.8'

services:
  # ==========================================
  # 1. THE DATABASE
  # ==========================================
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: supersecretroot
      MYSQL_DATABASE: employee_db
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpassword
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - employee-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. THE "BLUE" ENVIRONMENT (Port 8081)
  # ==========================================
  employee-app-blue:
    build: .
    image: employee-app:latest
    container_name: employee-app-blue
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/employee_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=dbuser
      - SPRING_DATASOURCE_PASSWORD=dbpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - employee-network

  # ==========================================
  # 3. THE "GREEN" ENVIRONMENT (Port 8082)
  # ==========================================
  employee-app-green:
    build: .
    image: employee-app:latest
    container_name: employee-app-green
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/employee_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=dbuser
      - SPRING_DATASOURCE_PASSWORD=dbpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - employee-network

  # ==========================================
  # 4. SONARQUBE
  # ==========================================
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_SEARCH_JAVAADDITIONALOPTS=-Xms256m -Xmx256m
      - SONAR_WEB_JAVAADDITIONALOPTS=-Xms512m -Xmx512m
    networks:
      - employee-network

  # ==========================================
  # 5. PROMETHEUS (Monitoring & Metrics)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - employee-network

  # ==========================================
  # 6. GRAFANA (Visualization Dashboards)
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin # Change this in production!
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - employee-network

# ==========================================
# INFRASTRUCTURE SETUP
# ==========================================
networks:
  employee-network:
    driver: bridge

volumes:
  mysql_data:
