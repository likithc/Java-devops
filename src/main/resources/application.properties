spring.application.name=employee-management-portal

# DevOps: Expose the health check endpoint for Jenkins
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ==========================================
# ACTUATOR & PROMETHEUS SETTINGS
# ==========================================
# Expose health, info, and prometheus endpoints over HTTP
management.endpoints.web.exposure.include=health,info,prometheus

# Provide detailed health information
management.endpoint.health.show-details=always

# (Optional) Tag metrics with the application name
spring.application.name=employee-app
