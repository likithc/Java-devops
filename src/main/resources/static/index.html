<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal v2.0</title>
    <style>
        /* Base Styling & Light Theme Gradient */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            transition: background 0.4s ease, color 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Dark Mode Theme */
        body.dark-mode {
            background: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%);
            color: #f1f1f1;
        }

        /* Top Navigation Bar */
        .navbar {
            width: 100%;
            padding: 15px 30px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Dark Mode Toggle Button */
        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: inherit;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Dashboard Container */
        .dashboard {
            max-width: 1000px;
            width: 90%;
            margin-top: 40px;
        }

        /* Glassmorphism Cards */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 25px;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        /* Dark Mode Adjustments for Cards */
        .dark-mode .glass-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        .dark-mode .navbar {
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Version Badge */
        .badge {
            background: #4CAF50;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            vertical-align: middle;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <h3 style="margin: 0;">Employee Portal <span class="badge">v2.0 Blue</span></h3>
        <button class="theme-toggle" onclick="toggleDarkMode()">🌓 Toggle Theme</button>
    </div>

    <!-- Main Dashboard -->
    <div class="dashboard">
        <!-- Smart Greeting -->
        <h1 id="smart-greeting" style="font-size: 2.5rem; margin-bottom: 5px;">Welcome!</h1>
        <p style="opacity: 0.8; margin-top: 0;">Here is your team overview for today.</p>

        <!-- Metrics Cards Grid -->
        <div class="grid-container">
            <div class="glass-card">
                <h3 style="margin-top: 0;">System Status</h3>
                <p>🟢 Online & Healthy</p>
                <p><small>Running on Port: 8081</small></p>
            </div>
            
            <div class="glass-card">
                <h3 style="margin-top: 0;">Active Employees</h3>
                <h2 style="margin: 0; font-size: 2rem;">142</h2>
                <p><small>+3 since last week</small></p>
            </div>

            <div class="glass-card">
                <h3 style="margin-top: 0;">Pending Approvals</h3>
                <h2 style="margin: 0; font-size: 2rem;">7</h2>
                <p><small>Requires attention</small></p>
            </div>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // 1. Smart Greeting Logic
        function setGreeting() {
            const hour = new Date().getHours();
            let greeting = "Good Evening";
            
            if (hour < 12) {
                greeting = "Good Morning";
            } else if (hour < 18) {
                greeting = "Good Afternoon";
            }
            
            document.getElementById("smart-greeting").innerText = greeting + ", Team!";
        }

        // 2. Dark Mode Toggle Logic
        function toggleDarkMode() {
            // Toggle the class on the body
            document.body.classList.toggle("dark-mode");
            
            // Optional: Save preference to local storage so it remembers the choice
            const isDark = document.body.classList.contains("dark-mode");
            localStorage.setItem("theme", isDark ? "dark" : "light");
        }

        // 3. Initialization
        window.onload = function() {
            setGreeting();
            
            // Check if user previously selected dark mode
            if (localStorage.getItem("theme") === "dark") {
                document.body.classList.add("dark-mode");
            }
        }
    </script>

</body>
</html>
